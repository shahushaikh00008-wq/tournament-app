<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Registration | Free Fire Tournament</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <nav>
        <div class="logo">
            <img src="../assets/logo.png" alt="FF Tournament">
        </div>
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="matches.html">Matches</a></li>
            <li><a href="leaderboard.html">Leaderboard</a></li>
            <li><a href="rules.html">Rules</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero hero-small">
    <div class="hero-content">
        <h1>TEAM REGISTRATION</h1>
        <p>Register Your Squad For The Tournament</p>
    </div>
</section>

<section class="register-section">
    <div class="register-container">
        <h2>Team Registration Form</h2>
        <form id="registrationForm">
            <div class="form-group">
                <label>Team Name</label>
                <input type="text" placeholder="Enter Team Name" required>
            </div>
            <div class="form-group">
                <label>Team Leader Name</label>
                <input type="text" placeholder="Enter Leader Name" required>
            </div>
            <div class="form-group">
                <label>Leader UID</label>
                <input type="number" placeholder="Free Fire UID" required>
            </div>
            <div class="form-group">
                <label>In-Game Name (IGN)</label>
                <input type="text" placeholder="Enter IGN" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter Email" required>
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" placeholder="Enter Mobile Number" required>
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text" placeholder="Enter State" required>
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" placeholder="Enter City" required>
            </div>
            <div class="form-group">
                <label>Team Members</label>
                <textarea rows="5" placeholder="Player 1&#10;Player 2&#10;Player 3&#10;Player 4"></textarea>
            </div>
            <div class="form-group">
                <label>Tournament Type</label>
                <select>
                    <option>Squad</option>
                    <option>Duo</option>
                    <option>Solo</option>
                </select>
            </div>
            <button class="submit-btn" type="submit">Register Team</button>
        </form>
        <p class="note">Registration confirmation will be sent after verification.</p>
    </div>
</section>

<footer>
    <p>&copy; 2026 Free Fire Tournament &mdash; All Rights Reserved</p>
</footer>

<script src="../js/script.js"></script>
</body>
</html>
